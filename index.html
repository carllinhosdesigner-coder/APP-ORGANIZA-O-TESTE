<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tarefas Diárias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overflow-x: hidden; touch-action: manipulation; }
        .score-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }

        @keyframes check-pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .check-anim { animation: check-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .task-card {
            transition: transform 0.2s ease-out;
            position: relative;
            touch-action: pan-y;
            cursor: grab;
        }
        .task-card:active { cursor: grabbing; }

        .swipe-bg {
            position: absolute;
            inset: 0;
            background: #16a34a;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 2rem;
            color: white;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .lucide { width: 20px; height: 20px; stroke-width: 2.5px; }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(1.55); opacity: 0; }
            100% { transform: scale(1.55); opacity: 0; }
        }
        @keyframes pulse-ring2 {
            0% { transform: scale(1); opacity: 0.3; }
            70% { transform: scale(1.9); opacity: 0; }
            100% { transform: scale(1.9); opacity: 0; }
        }
        @keyframes btn-breathe {
            0%, 100% { box-shadow: 0 0 32px 8px rgba(249,115,22,0.35); }
            50% { box-shadow: 0 0 64px 20px rgba(249,115,22,0.6); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-out-scale {
            0% { opacity: 1; transform: scale(1); }
            60% { opacity: 0; transform: scale(1.18); }
            100% { opacity: 0; transform: scale(1.18); }
        }

        #start-screen { animation: fade-in-up 0.6s ease both; }

        .start-btn-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }
        .start-btn-wrap .ring {
            position: absolute; inset: 0; border-radius: 9999px;
            background: rgba(249,115,22,0.45);
            animation: pulse-ring 2.2s ease-out infinite;
        }
        .start-btn-wrap .ring2 {
            position: absolute; inset: 0; border-radius: 9999px;
            background: rgba(249,115,22,0.2);
            animation: pulse-ring2 2.2s ease-out infinite 0.4s;
        }
        #btn-start {
            position: relative; z-index: 2; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            animation: btn-breathe 2.2s ease-in-out infinite;
        }
        #btn-start:active { transform: scale(0.96); }
        .start-exit { animation: fade-out-scale 0.45s ease forwards !important; }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(32px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-animated {
            opacity: 0;
            animation: card-enter 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 8px 1px rgba(34,197,94,0.25), inset 0 0 8px 1px rgba(34,197,94,0.05); }
            50% { box-shadow: 0 0 18px 4px rgba(34,197,94,0.45), inset 0 0 12px 2px rgba(34,197,94,0.1); }
        }
        #btn-add-task {
            animation: border-glow 2.8s ease-in-out infinite;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #btn-add-task:active { transform: scale(0.97); }

        @keyframes modal-in {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes modal-out {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to   { opacity: 0; transform: translateY(24px) scale(0.98); }
        }
        @keyframes overlay-in  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes overlay-out { from { opacity: 1; } to { opacity: 0; } }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 140;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.is-hidden { display: none; }
        .modal-overlay.anim-in  { animation: overlay-in  0.28s ease forwards; }
        .modal-overlay.anim-out { animation: overlay-out 0.22s ease forwards; }

        .modal-sheet {
            width: 100%; max-width: 28rem;
            background: #111111;
            border: 1px solid rgba(255,255,255,0.07);
            border-bottom: none;
            border-radius: 28px 28px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
        }
        .modal-sheet.anim-in  { animation: modal-in  0.32s cubic-bezier(0.22,1,0.36,1) forwards; }
        .modal-sheet.anim-out { animation: modal-out 0.22s ease forwards; }

        .modal-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.12);
            border-radius: 9999px;
            margin: 14px auto 0;
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .modal-header-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .modal-title-group { display: flex; align-items: center; gap: 12px; }
        .modal-title { font-size: 13px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
        .modal-subtitle { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #52525b; margin-top: 1px; }

        .modal-close-btn {
            width: 34px; height: 34px; border-radius: 9999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; flex-shrink: 0;
            transition: background 0.15s;
        }
        .modal-close-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.93); }
        .modal-close-btn .lucide { width: 16px; height: 16px; stroke: #71717a; }

        .modal-input-wrap { position: relative; }
        .modal-input-label {
            position: absolute; top: 50%; left: 16px;
            transform: translateY(-50%);
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #52525b;
            pointer-events: none; transition: all 0.18s;
        }
        .modal-input {
            width: 100%; background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 20px 16px 8px;
            font-size: 14px; color: #f4f4f5;
            outline: none; transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .modal-input:focus { border-color: rgba(255,255,255,0.18); }
        .modal-input:focus + .modal-input-label,
        .modal-input:not(:placeholder-shown) + .modal-input-label {
            top: 10px; transform: none; font-size: 9px; color: #71717a;
        }

        .modal-confirm-btn {
            width: 100%; padding: 16px;
            border-radius: 16px; border: none;
            font-size: 11px; font-weight: 900;
            letter-spacing: 0.15em; text-transform: uppercase;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: opacity 0.15s, transform 0.15s;
            position: relative; overflow: hidden;
        }
        .modal-confirm-btn:active { opacity: 0.85; transform: scale(0.98); }
        .modal-confirm-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            pointer-events: none;
        }

        .reward-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px; padding: 18px;
            transition: border-color 0.2s;
        }
        .reward-card:active { border-color: rgba(255,255,255,0.14); }

        .store-input-section {
            padding: 20px 24px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
    </style>
</head>
<body class="bg-[#0c0c0c] text-zinc-100 font-sans min-h-screen relative">

    <div id="main-view" class="max-w-md mx-auto p-6 pb-32">
        <header class="mb-8 pt-6">
            <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-10 shadow-2xl text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-600 to-orange-400"></div>
                <button onclick="toggleView('history')" class="absolute top-6 left-6 text-zinc-400 p-2.5 bg-zinc-800 rounded-full border border-zinc-700 active:scale-95 z-10">
                    <i data-lucide="history"></i>
                </button>
                <button onclick="toggleStore()" class="absolute top-6 right-6 text-orange-500 p-2.5 bg-orange-500/10 rounded-full border border-orange-500/20 active:scale-95 z-10">
                    <i data-lucide="shopping-bag"></i>
                </button>
                <h1 class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-black mb-1 mt-2">Performance Score</h1>
                <div id="score" class="text-8xl font-black text-white tracking-tighter score-glow">0</div>
                <div class="mt-5 inline-flex flex-col items-center gap-2 w-full">
                    <div class="px-5 py-2 rounded-full bg-orange-500/10 border border-orange-500/20">
                        <span id="rank-name" class="text-[10px] font-black uppercase text-orange-500 tracking-[0.2em]">Criança</span>
                    </div>
                    <div class="w-full max-w-[150px] h-1.5 bg-zinc-800 rounded-full mt-2 overflow-hidden">
                        <div id="daily-progress" class="h-full bg-orange-500 transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex justify-between items-end mb-6 px-1">
            <h2 class="text-xs font-black uppercase tracking-widest text-white">Tarefas</h2>
        </div>

        <div id="start-screen" class="hidden flex-col items-center justify-center py-16 gap-8">
            <div class="text-center space-y-2">
                <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-black">Pronto para hoje?</p>
                <p class="text-zinc-400 text-sm font-bold">Toque para carregar suas tarefas</p>
            </div>
            <div class="start-btn-wrap">
                <div class="ring"></div>
                <div class="ring2"></div>
                <button id="btn-start" class="bg-orange-500 text-white font-black text-xl uppercase tracking-widest px-14 py-6 rounded-full border-2 border-orange-400">
                    INICIAR
                </button>
            </div>
            <p class="text-zinc-700 text-[10px] uppercase tracking-widest font-bold">Novo dia. Nova chance.</p>
        </div>

        <div id="taskList" class="space-y-4"></div>
    </div>

    <div id="add-task-bar" class="hidden fixed bottom-0 left-0 right-0 z-[100] flex justify-center pb-8 pt-4 bg-gradient-to-t from-[#0c0c0c] via-[#0c0c0c]/80 to-transparent pointer-events-none">
        <button id="btn-add-task" class="pointer-events-auto bg-zinc-900 border border-green-500/40 text-green-400 font-black text-xs uppercase tracking-widest px-10 py-4 rounded-full flex items-center gap-3">
            <i data-lucide="plus-circle" class="w-4 h-4"></i>
            Adicionar Tarefa
        </button>
    </div>

    <!-- MODAL: ADICIONAR TAREFA -->
    <div id="addTaskOverlay" class="modal-overlay is-hidden" style="align-items: flex-end;">
        <div id="addTaskSheet" class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-header-icon" style="background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2);">
                        <i data-lucide="plus-circle" style="width:18px;height:18px;stroke:#22c55e;stroke-width:2.5"></i>
                    </div>
                    <div>
                        <div class="modal-title" style="color:#22c55e;">Nova Tarefa</div>
                        <div class="modal-subtitle">Adicione ao seu dia</div>
                    </div>
                </div>
                <button class="modal-close-btn" id="btn-close-add"><i data-lucide="x"></i></button>
            </div>
            <div style="padding: 24px; display: flex; flex-direction: column; gap: 14px;">
                <div class="modal-input-wrap">
                    <input class="modal-input" type="text" id="taskInput" placeholder=" ">
                    <label class="modal-input-label">Nome da tarefa</label>
                </div>
                <div class="modal-input-wrap">
                    <input class="modal-input" type="number" id="taskPoints" placeholder=" " style="color:#f97316;">
                    <label class="modal-input-label">Pontos</label>
                </div>
                <div style="height:1px; background: rgba(255,255,255,0.05); margin: 4px 0;"></div>
                <button class="modal-confirm-btn" onclick="addTask()" style="background: #16a34a; color: white;">
                    Confirmar Tarefa
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL: LOJA DE RECOMPENSAS -->
    <div id="storeOverlay" class="modal-overlay is-hidden">
        <div id="storeSheet" class="modal-sheet" style="border-radius: 28px; max-height: 85vh; display: flex; flex-direction: column;">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-header-icon" style="background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.2);">
                        <i data-lucide="shopping-bag" style="width:18px;height:18px;stroke:#f97316;stroke-width:2.5"></i>
                    </div>
                    <div>
                        <div class="modal-title" style="color:#f97316;">Loja de Mimos</div>
                        <div class="modal-subtitle">Resgate sua recompensa</div>
                    </div>
                </div>
                <button class="modal-close-btn" id="btn-close-store"><i data-lucide="x"></i></button>
            </div>
            <div class="store-input-section">
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    <div class="modal-input-wrap" style="flex:1">
                        <input class="modal-input" type="text" id="newRewardName" placeholder=" ">
                        <label class="modal-input-label">Nova recompensa</label>
                    </div>
                    <div class="modal-input-wrap" style="width:80px">
                        <input class="modal-input" type="number" id="newRewardCost" placeholder=" " style="color:#f97316; padding-left:12px; padding-right:12px; text-align:center;">
                        <label class="modal-input-label" style="left:12px;">Pts</label>
                    </div>
                </div>
                <button class="modal-confirm-btn" onclick="createReward()" style="background: #ea580c; color: white;">
                    Criar Recompensa
                </button>
            </div>
            <div id="storeItems" class="custom-scroll" style="padding: 20px 24px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1;"></div>
        </div>
    </div>

    <div id="history-view" class="max-w-md mx-auto p-6 pb-24 hidden">
        <header class="mb-8 pt-6 flex items-center justify-between">
            <button onclick="toggleView('main')" class="text-zinc-400 p-2.5 bg-zinc-900 rounded-full border border-zinc-800"><i data-lucide="arrow-left"></i></button>
            <h2 class="text-xs font-black uppercase tracking-widest text-white">Concluidas</h2>
            <div class="w-10"></div>
        </header>
        <div id="historyList" class="space-y-4"></div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-[10px] font-black tracking-widest shadow-2xl transition-all duration-300 z-[200] pointer-events-none opacity-0 translate-y-20 bg-orange-600 text-white"></div>

    <script>
        let score = parseInt(localStorage.getItem('app_score')) || 0;
        let tasks = JSON.parse(localStorage.getItem('app_tasks')) || [];
        let rewards = JSON.parse(localStorage.getItem('app_rewards')) || [];

        const ranks = [
            { name: "Criança", min: 0 },
            { name: "Adolescente", min: 20 },
            { name: "Jovem", min: 40 },
            { name: "Adulto", min: 60 },
            { name: "Sábio", min: 80 }
        ];

        // --- BOTÃO INICIAR ---
        const btnStart = document.getElementById('btn-start');
        btnStart.addEventListener('click', handleStart);
        btnStart.addEventListener('touchend', function(e) { e.preventDefault(); handleStart(); });

        function handleStart() {
            const screen = document.getElementById('start-screen');
            screen.classList.add('start-exit');
            setTimeout(() => {
                screen.classList.add('hidden');
                screen.classList.remove('flex', 'start-exit');
                restoreDefaultTasks(true);
            }, 420);
        }

        // --- HELPERS DE MODAL ---
        function openModal(overlayId, sheetId) {
            const overlay = document.getElementById(overlayId);
            const sheet = document.getElementById(sheetId);
            overlay.classList.remove('is-hidden', 'anim-out');
            sheet.classList.remove('anim-out');
            overlay.classList.add('anim-in');
            sheet.classList.add('anim-in');
        }

        function closeModal(overlayId, sheetId, callback) {
            const overlay = document.getElementById(overlayId);
            const sheet = document.getElementById(sheetId);
            overlay.classList.remove('anim-in');
            sheet.classList.remove('anim-in');
            overlay.classList.add('anim-out');
            sheet.classList.add('anim-out');
            setTimeout(() => {
                overlay.classList.add('is-hidden');
                overlay.classList.remove('anim-out');
                sheet.classList.remove('anim-out');
                if (callback) callback();
            }, 220);
        }

        // --- MODAL ADICIONAR TAREFA ---
        const btnAddTask = document.getElementById('btn-add-task');
        const btnCloseAdd = document.getElementById('btn-close-add');
        const addTaskOverlay = document.getElementById('addTaskOverlay');

        btnAddTask.addEventListener('click', openAddModal);
        btnAddTask.addEventListener('touchend', function(e) { e.preventDefault(); openAddModal(); });
        btnCloseAdd.addEventListener('click', closeAddModal);
        btnCloseAdd.addEventListener('touchend', function(e) { e.preventDefault(); closeAddModal(); });
        addTaskOverlay.addEventListener('click', function(e) { if (e.target === addTaskOverlay) closeAddModal(); });

        function openAddModal() { openModal('addTaskOverlay', 'addTaskSheet'); setTimeout(() => document.getElementById('taskInput').focus(), 300); }
        function closeAddModal() { closeModal('addTaskOverlay', 'addTaskSheet'); }

        // --- MODAL LOJA ---
        const btnCloseStore = document.getElementById('btn-close-store');
        const storeOverlay = document.getElementById('storeOverlay');

        btnCloseStore.addEventListener('click', closeStore);
        btnCloseStore.addEventListener('touchend', function(e) { e.preventDefault(); closeStore(); });
        storeOverlay.addEventListener('click', function(e) { if (e.target === storeOverlay) closeStore(); });

        function toggleStore() { openModal('storeOverlay', 'storeSheet'); renderStore(); }
        function closeStore() { closeModal('storeOverlay', 'storeSheet'); }

        // --- RESET DE MEIA-NOITE ---
        function checkDailyReset() {
            const lastDate = localStorage.getItem('app_last_date');
            const today = new Date().toLocaleDateString();
            if (lastDate !== today) {
                tasks.forEach(t => t.completed = false);
                const dayOfWeek = new Date().getDay();
                if (dayOfWeek === 0) { score = 0; localStorage.setItem('app_score', score); }
                localStorage.removeItem('app_defaults_loaded');
                localStorage.setItem('app_last_date', today);
                saveData();
            }
        }

        // --- ÍCONES (tarefas + recompensas) ---
        const iconMap = {
            // Tarefas domésticas
            'louça': 'utensils', 'robô': 'bot', 'estudar': 'book-open',
            'bebê': 'baby', 'dormir': 'moon', 'acordar': 'sun',
            'treinar': 'dumbbell', 'mercado': 'shopping-basket', 'carro': 'car',
            'lixo': 'trash', 'desenhar': 'brush', 'banheiro': 'toilet',
            'roupa': 'shirt', 'roupas': 'shirt', 'lavar roupa': 'shirt',
            'passar roupa': 'shirt', 'dobrar': 'shirt',
            'leitura': 'book', 'ler': 'book', 'livro': 'book',
            'comida': 'chef-hat', 'cozinhar': 'chef-hat', 'almoço': 'chef-hat',
            'jantar': 'chef-hat', 'café': 'coffee', 'mamadeira': 'baby',
            'limpar': 'sparkles', 'limpeza': 'sparkles', 'varrer': 'sparkles',
            'organizar': 'layout-list', 'organização': 'layout-list',
            'compras': 'shopping-cart', 'feira': 'shopping-cart',
            'remédio': 'pill', 'medicamento': 'pill', 'vitamina': 'pill',
            'médico': 'stethoscope', 'consulta': 'stethoscope',
            'banho': 'shower-head', 'higiene': 'shower-head',
            'pagar': 'receipt', 'conta': 'receipt', 'boleto': 'receipt',
            'dinheiro': 'wallet', 'financeiro': 'wallet',
            'trabalho': 'briefcase', 'reunião': 'users', 'email': 'mail',
            'ligar': 'phone', 'ligação': 'phone',
            'tarefa': 'check-square', 'meta': 'flag',
            'pet': 'paw-print', 'cachorro': 'paw-print', 'gato': 'paw-print',
            'animal': 'paw-print',
            'música': 'music', 'jogar': 'gamepad-2', 'jogo': 'gamepad-2',
            'filme': 'tv', 'série': 'tv', 'passear': 'map-pin',
            'academia': 'dumbbell', 'meditar': 'heart',
            // Recompensas — comida & bebida
            'pizza': 'pizza', 'sorvete': 'ice-cream-2', 'chocolate': 'candy',
            'doce': 'candy', 'bolo': 'cake', 'hamburguer': 'beef',
            'hambúrguer': 'beef', 'lanche': 'sandwich', 'sushi': 'fish',
            'restaurante': 'utensils', 'delivery': 'package',
            'cerveja': 'beer', 'vinho': 'wine', 'drink': 'cocktail',
            'suco': 'cup-soda', 'refrigerante': 'cup-soda',
            // Recompensas — lazer & entretenimento
            'cinema': 'clapperboard', 'netflix': 'tv-2', 'streaming': 'tv-2',
            'show': 'ticket', 'teatro': 'ticket', 'ingresso': 'ticket',
            'viagem': 'plane', 'passeio': 'map-pin', 'praia': 'waves',
            'parque': 'trees', 'piscina': 'waves', 'spa': 'flower-2',
            'massagem': 'hand', 'salão': 'scissors', 'cabelo': 'scissors',
            'unha': 'scissors', 'manicure': 'scissors',
            // Recompensas — compras & presentes
            'roupa nova': 'shopping-bag', 'sapato': 'footprints',
            'tênis': 'footprints', 'presente': 'gift', 'compra': 'shopping-bag',
            'perfume': 'sparkles', 'maquiagem': 'sparkles',
            'acessório': 'watch', 'relógio': 'watch', 'bolsa': 'briefcase',
            // Recompensas — tecnologia
            'jogo': 'gamepad-2', 'game': 'gamepad-2', 'app': 'smartphone',
            'celular': 'smartphone', 'fone': 'headphones',
            'headphone': 'headphones', 'computador': 'laptop',
            // Recompensas — descanso & bem-estar
            'descanso': 'sofa', 'sofá': 'sofa', 'dormir tarde': 'moon',
            'soneca': 'moon', 'folga': 'calendar-off',
            'meditação': 'flower-2', 'yoga': 'flower-2',
            // Recompensas — dinheiro
            'grana': 'banknote', 'vale': 'banknote', 'crédito': 'credit-card',
            'cartão': 'credit-card', 'pix': 'zap',
            // Default
            'default': 'gift'
        };

        function getIcon(title) {
            const t = title.toLowerCase();
            for (let key in iconMap) { if (t.includes(key)) return iconMap[key]; }
            return iconMap['default'];
        }

        // --- SWIPE ---
        function setupSwipe(el, taskId) {
            let startX = 0, currentX = 0, isDragging = false;
            const threshold = -110;
            const start = (e) => {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                el.style.transition = 'none';
            };
            const move = (e) => {
                if (!isDragging) return;
                currentX = (e.type.includes('mouse') ? e.clientX : e.touches[0].clientX) - startX;
                if (currentX < 0) {
                    e.preventDefault();
                    el.style.transform = `translateX(${currentX}px)`;
                    el.parentElement.querySelector('.swipe-bg').style.opacity = Math.min(Math.abs(currentX) / 100, 1);
                }
            };
            const end = () => {
                if (!isDragging) return;
                isDragging = false;
                el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                if (currentX < threshold) {
                    el.style.transform = `translateX(-110%)`;
                    setTimeout(() => completeTask(taskId), 200);
                } else {
                    el.style.transform = `translateX(0)`;
                    el.parentElement.querySelector('.swipe-bg').style.opacity = 0;
                }
                currentX = 0;
            };
            el.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            el.addEventListener('touchstart', start, { passive: false });
            el.addEventListener('touchmove', move, { passive: false });
            el.addEventListener('touchend', end);
        }

        function completeTask(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            score += t.points;
            t.completed = true;
            updateUI();
            showToast(`+${t.points} PONTOS`);
        }

        function updateUI(animate) {
            const totalTasks = tasks.length;
            const completedCount = tasks.filter(t => t.completed).length;
            const progressPercent = totalTasks > 0 ? (completedCount / totalTasks) * 100 : 0;

            const currentRank = [...ranks].reverse().find(r => progressPercent >= r.min) || ranks[0];
            document.getElementById('rank-name').innerText = currentRank.name;
            document.getElementById('daily-progress').style.width = `${progressPercent}%`;
            document.getElementById('score').innerText = score;

            const tList = document.getElementById('taskList');
            const activeTasks = tasks.filter(t => !t.completed);
            tList.innerHTML = '';

            const today = new Date().toLocaleDateString();
            const defaultsLoaded = localStorage.getItem('app_defaults_loaded') === today;
            const startScreen = document.getElementById('start-screen');
            const addTaskBar = document.getElementById('add-task-bar');

            if (!defaultsLoaded) {
                startScreen.classList.remove('hidden');
                startScreen.classList.add('flex');
                addTaskBar.classList.add('hidden');
                addTaskBar.classList.remove('flex');
            } else {
                startScreen.classList.add('hidden');
                startScreen.classList.remove('flex');
                addTaskBar.classList.remove('hidden');
                addTaskBar.classList.add('flex');
            }

            activeTasks.forEach((t, i) => {
                const container = document.createElement('div');
                container.className = "relative overflow-hidden rounded-2xl";
                if (animate) {
                    container.classList.add('card-animated');
                    container.style.animationDelay = `${i * 60}ms`;
                }
                container.innerHTML = `
                    <div class="swipe-bg"><i data-lucide="check" class="w-8 h-8"></i></div>
                    <div class="task-card p-5 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-between z-10" data-id="${t.id}">
                        <div class="flex items-center gap-4 pointer-events-none select-none">
                            <div class="text-orange-500 bg-zinc-950 p-3 rounded-xl border border-zinc-800"><i data-lucide="${getIcon(t.title)}"></i></div>
                            <div><p class="font-bold text-sm text-zinc-100">${t.title}</p><p class="text-[9px] font-black text-orange-600 uppercase tracking-widest">${t.points} Pts</p></div>
                        </div>
                        <button onclick="deleteItem('task', ${t.id})" class="text-zinc-700 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                tList.appendChild(container);
                setupSwipe(container.querySelector('.task-card'), t.id);
            });

            saveData();
            lucide.createIcons();
        }

        // --- LOJA ---
        function createReward() {
            const name = document.getElementById('newRewardName').value.trim();
            const cost = parseInt(document.getElementById('newRewardCost').value);
            if (name && cost) {
                rewards.unshift({ id: Date.now(), name, cost });
                document.getElementById('newRewardName').value = '';
                document.getElementById('newRewardCost').value = '';
                renderStore();
                saveData();
                showToast("RECOMPENSA SALVA!");
            }
        }

        function renderStore() {
            const container = document.getElementById('storeItems');
            container.innerHTML = '';
            if (!rewards.length) {
                container.innerHTML = '<p style="text-align:center;color:#3f3f46;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:24px 0;">Nenhuma recompensa</p>';
                return;
            }
            rewards.forEach(r => {
                const icon = getIcon(r.name);
                const canBuy = score >= r.cost;
                const card = document.createElement('div');
                card.className = 'reward-card';
                card.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:40px;height:40px;border-radius:12px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <i data-lucide="${icon}" style="width:18px;height:18px;stroke:#f97316;stroke-width:2.5"></i>
                            </div>
                            <div>
                                <p style="font-weight:700;font-size:14px;color:#f4f4f5;line-height:1.2;">${r.name}</p>
                                <p style="font-size:10px;font-weight:700;color:#52525b;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;">${r.cost} pts</p>
                            </div>
                        </div>
                        <button onclick="deleteItem('reward', ${r.id})" style="padding:6px;color:#3f3f46;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;">
                            <i data-lucide="trash-2" style="width:15px;height:15px;"></i>
                        </button>
                    </div>
                    <button onclick="buyReward(${r.cost})" class="modal-confirm-btn" style="background:${canBuy ? '#ea580c' : '#27272a'};color:${canBuy ? 'white' : '#52525b'};${canBuy ? '' : 'cursor:not-allowed;'}">
                        ${canBuy ? 'Resgatar' : 'Pontos insuficientes'}
                    </button>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function buyReward(cost) {
            if (score >= cost) {
                score -= cost;
                updateUI();
                renderStore();
                showToast("RESGATADO COM SUCESSO!");
            }
        }

        function deleteItem(type, id) {
            if (confirm("Excluir item permanentemente?")) {
                if (type === 'task') tasks = tasks.filter(t => t.id !== id);
                else { rewards = rewards.filter(r => r.id !== id); renderStore(); }
                updateUI();
            }
        }

        // --- UTILITÁRIOS ---
        function addTask() {
            const title = document.getElementById('taskInput').value.trim();
            const points = parseInt(document.getElementById('taskPoints').value) || 10;
            if (title) {
                tasks.push({ id: Date.now(), title, points, completed: false });
                document.getElementById('taskInput').value = '';
                document.getElementById('taskPoints').value = '';
                closeAddModal();
                updateUI();
                showToast("TAREFA ADICIONADA!");
            }
        }

        function restoreDefaultTasks(animate) {
            const defaults = [
                { title: 'Lavar louças', points: 10 }, { title: 'Limpar Robô', points: 15 },
                { title: 'Estudar por 1 Hora', points: 20 }, { title: 'Mamadeira Bebê', points: 10 },
                { title: 'Treinar', points: 25 }, { title: 'Lavar Carro', points: 35 },
                { title: 'Tirar Lixo', points: 15 }, { title: 'Comida Bebê', points: 15 },
                { title: 'Desenhar', points: 20 }, { title: 'Ninar Bebê', points: 25 },
                { title: 'Acordar até 7H', points: 15 }, { title: 'Dormir antes das 11H', points: 10 },
                { title: 'Supermercado', points: 20 }, { title: 'Passar Roupas', points: 30 },
                { title: 'Banho do Bebê', points: 30 }, { title: 'Lavar Roupas', points: 20 },
            ];
            defaults.forEach(dt => {
                if (!tasks.some(t => t.title === dt.title))
                    tasks.push({ id: Date.now() + Math.random(), title: dt.title, points: dt.points, completed: false });
            });
            localStorage.setItem('app_defaults_loaded', new Date().toLocaleDateString());
            updateUI(animate);
        }

        function toggleView(view) {
            document.getElementById('main-view').classList.toggle('hidden', view === 'history');
            document.getElementById('history-view').classList.toggle('hidden', view === 'main');
            const addTaskBar = document.getElementById('add-task-bar');
            if (view === 'history') { addTaskBar.classList.add('hidden'); renderHistory(); }
            else updateUI();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const completed = tasks.filter(t => t.completed);
            historyList.innerHTML = completed.length ? '' : '<p class="text-center text-zinc-600 py-10 text-xs font-bold uppercase tracking-widest">Vazio</p>';
            completed.forEach(t => {
                const div = document.createElement('div');
                div.className = "p-5 rounded-2xl bg-zinc-950 border border-zinc-900 flex items-center justify-between opacity-80";
                div.innerHTML = `<div class="flex items-center gap-4"><div class="text-green-500 bg-zinc-900 p-3 rounded-xl border border-zinc-800"><i data-lucide="check-circle"></i></div><div><p class="font-bold text-sm text-zinc-400 line-through">${t.title}</p><p class="text-[9px] font-black text-green-600 uppercase tracking-widest">+${t.points} Pts</p></div></div><button onclick="recoverTask(${t.id})" class="bg-zinc-800 text-zinc-100 p-3 rounded-xl hover:bg-orange-600 transition-colors"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>`;
                historyList.appendChild(div);
            });
            lucide.createIcons();
        }

        function recoverTask(id) {
            const t = tasks.find(x => x.id === id);
            if (t) { score -= t.points; t.completed = false; renderHistory(); updateUI(); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-20');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { t.classList.remove('opacity-100', 'translate-y-0'); t.classList.add('opacity-0', 'translate-y-20'); }, 2000);
        }

        function saveData() {
            localStorage.setItem('app_score', score);
            localStorage.setItem('app_tasks', JSON.stringify(tasks));
            localStorage.setItem('app_rewards', JSON.stringify(rewards));
        }

        checkDailyReset();
        updateUI();
    </script>
</body>
</html>
