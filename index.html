<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Performance Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .score-glow { text-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
        @keyframes pulse-orange {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); color: #fb923c; }
            100% { transform: scale(1); }
        }
        @keyframes slide-up {
            0% { transform: translate(-50%, 100%); opacity: 0; }
            100% { transform: translate(-50%, 0); opacity: 1; }
        }
        .animate-score { animation: pulse-orange 0.3s ease-out; }
        .conquest-card { 
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            z-index: 100;
            animation: slide-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .lucide { width: 20px; height: 20px; stroke-width: 2.5px; }
    </style>
</head>
<body class="bg-[#0c0c0c] text-zinc-100 font-sans min-h-screen relative">

    <div class="max-w-md mx-auto p-6 pb-24">
        <header class="mb-8 pt-6">
            <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-10 shadow-2xl text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-600 to-orange-400"></div>
                
                <button onclick="toggleStore()" class="absolute top-6 right-6 text-orange-500 p-2.5 bg-orange-500/10 rounded-full border border-orange-500/20 active:scale-95 z-10">
                    <i data-lucide="shopping-bag"></i>
                </button>

                <h1 class="text-[10px] uppercase tracking-[0.4em] text-zinc-500 font-black mb-1 mt-2">Performance Score</h1>
                <div id="score" class="text-8xl font-black text-white tracking-tighter score-glow">0</div>
                
                <div class="mt-5 inline-flex flex-col items-center gap-2">
                    <div class="px-5 py-2 rounded-full bg-orange-500/10 border border-orange-500/20">
                        <span id="rank-name" class="text-[10px] font-black uppercase text-orange-500 tracking-[0.2em]">Vagabundo</span>
                    </div>
                    <div class="w-32 h-1 bg-zinc-800 rounded-full mt-2 overflow-hidden">
                        <div id="daily-progress" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-10 shadow-xl">
            <div class="flex gap-3 mb-4">
                <input type="text" id="taskInput" placeholder="Nova missão..." class="flex-1 bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-orange-500">
                <input type="number" id="taskPoints" placeholder="Pts" class="w-20 bg-zinc-950 border border-zinc-800 rounded-xl px-2 py-4 text-center text-sm focus:outline-none focus:border-orange-500 font-bold text-orange-500">
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-3 text-[10px] font-black uppercase text-zinc-500 cursor-pointer">
                    <input type="checkbox" id="taskDaily" class="w-5 h-5 rounded border-zinc-800 bg-zinc-950 text-orange-600 focus:ring-0">
                    Tarefa Diária
                </label>
                <button onclick="addTask()" class="bg-white text-black px-8 py-3 rounded-xl font-black text-xs uppercase hover:bg-orange-500 hover:text-white transition-all">Salvar</button>
            </div>
        </div>

        <div class="flex justify-between items-end mb-6 px-1">
            <h2 class="text-xs font-black uppercase tracking-widest text-white">Quadro de Missões</h2>
            <div class="flex gap-2">
                <button onclick="restoreDefaultTasks()" class="text-[9px] bg-zinc-900 text-zinc-400 px-3 py-1.5 rounded-lg border border-zinc-800 font-bold uppercase transition-all">Padrões</button>
                <button onclick="clearTasksOnly()" class="text-[9px] bg-zinc-900 text-zinc-700 px-3 py-1.5 rounded-lg border border-zinc-800 font-bold uppercase transition-all">Reset Tarefas</button>
            </div>
        </div>

        <div id="taskList" class="space-y-4"></div>
    </div>

    <div id="storeModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-xl opacity-0 pointer-events-none transition-all">
        <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] w-full max-w-sm shadow-2xl flex flex-col overflow-hidden max-h-[85vh]">
            <div class="p-8 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <div>
                    <h2 class="text-xs font-black uppercase text-orange-500 mb-1">Mercado Pro</h2>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Resgate Prêmios</p>
                </div>
                <button onclick="toggleStore()" class="text-zinc-500 bg-zinc-800 p-2 rounded-full hover:text-white">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-6 bg-zinc-950/50 border-b border-zinc-800">
                <div class="flex flex-col gap-2">
                    <div class="flex gap-3">
                        <input type="text" id="newRewardName" placeholder="Prêmio..." class="text-xs flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none">
                        <input type="number" id="newRewardCost" placeholder="Pts" class="text-xs w-20 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none font-bold text-orange-500 text-center">
                    </div>
                    <button onclick="createReward()" class="w-full bg-zinc-100 text-black py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-colors">Cadastrar Recompensa</button>
                </div>
            </div>
            <div id="storeItems" class="p-6 space-y-4 overflow-y-auto custom-scroll flex-1"></div>
        </div>
    </div>

    <div id="conquestOverlay" class="z-[100] pointer-events-none"></div>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full text-[10px] font-black tracking-widest shadow-2xl transition-all duration-300 z-50 pointer-events-none opacity-0 translate-y-20 bg-orange-600 text-white"></div>

    <script>
        // Atualizado com os novos ícones para as recompensas padrão
        const taskIcons = {
            'Lavar louça': 'utensils', 'Limpar Robô': 'cpu', 'Estudar 1 Hora': 'book-open',
            'Mamadeira Bebê': 'baby', 'Colocar Bebê para Dormir': 'moon',
            'Dormir antes das 11H': 'bed', 'Acordar até 7H': 'sunrise',
            'Treinar': 'dumbbell', 'Supermercado': 'shopping-basket',
            '1 Hora de Video game': 'gamepad-2', 
            '1 Hora de Sono': 'bed', 
            '1 Hora de Sossego': 'wind', 
            'Passeio Solo': 'footprints', 
            'Pedir Delivery': 'pizza',
            'default_task': 'target', 'default_reward': 'trophy'
        };

        let score = parseInt(localStorage.getItem('app_score')) || 0;
        let lastReset = localStorage.getItem('app_last_reset') || "";
        let tasks = JSON.parse(localStorage.getItem('app_tasks')) || [];
        
        // Recompensas Padrão
        const defaultRewards = [
            { id: 101, name: '1 Hora de Video game', cost: 500 },
            { id: 102, name: '1 Hora de Sono', cost: 500 },
            { id: 103, name: '1 Hora de Sossego', cost: 500 },
            { id: 104, name: 'Passeio Solo', cost: 500 },
            { id: 105, name: 'Pedir Delivery', cost: 500 }
        ];

        // Lógica de Primeiro Acesso para a Loja
        let savedRewards = localStorage.getItem('app_rewards');
        let rewards = savedRewards ? JSON.parse(savedRewards) : defaultRewards;
        
        let lastRankIndex = -1;

        const ranks = [
            { name: "Vagabundo", min: 0 },
            { name: "Cidadão", min: 0.25 },
            { name: "Orgulho", min: 0.50 },
            { name: "Te respeito", min: 0.75 },
            { name: "Monstro", min: 1.0 }
        ];

        function updateUI() {
            const totalTasks = tasks.length;
            const completedToday = tasks.filter(t => t.completed).length;
            const progress = totalTasks > 0 ? completedToday / totalTasks : 0;
            
            let currentRankIndex = 0;
            for(let i = ranks.length - 1; i >= 0; i--) {
                if(progress >= ranks[i].min) {
                    currentRankIndex = i;
                    break;
                }
            }

            if (currentRankIndex > lastRankIndex && lastRankIndex !== -1) {
                showConquest(ranks[currentRankIndex].name);
            }
            lastRankIndex = currentRankIndex;

            document.getElementById('score').innerText = score;
            document.getElementById('rank-name').innerText = ranks[currentRankIndex].name;
            document.getElementById('daily-progress').style.width = `${progress * 100}%`;

            const tList = document.getElementById('taskList');
            tList.innerHTML = '';
            tasks.forEach(t => {
                const iconName = taskIcons[t.title] || taskIcons['default_task'];
                const div = document.createElement('div');
                div.className = `card-anim p-5 rounded-2xl border flex items-center justify-between ${t.completed ? 'bg-zinc-950 border-zinc-900 opacity-40 scale-[0.98]' : 'bg-zinc-900 border-zinc-800 shadow-lg'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="${t.completed ? 'text-zinc-700' : 'text-orange-500'} bg-zinc-950 p-3 rounded-xl border border-zinc-800">
                            <i data-lucide="${iconName}"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm ${t.completed ? 'line-through text-zinc-600' : 'text-zinc-100'}">${t.title}</p>
                            <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest">${t.points} Pts</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${!t.completed ? `
                            <button onclick="editItem('task', ${t.id})" class="text-zinc-600 p-2"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('task', ${t.id})" class="text-zinc-600 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            <button onclick="completeTask(${t.id})" class="ml-2 bg-orange-600 text-white text-[10px] font-black px-5 py-2.5 rounded-xl uppercase">Check</button>
                        ` : '<div class="text-orange-500/50 p-2"><i data-lucide="check-circle" class="w-6 h-6"></i></div>'}
                    </div>
                `;
                tList.appendChild(div);
            });

            localStorage.setItem('app_score', score);
            localStorage.setItem('app_tasks', JSON.stringify(tasks));
            localStorage.setItem('app_rewards', JSON.stringify(rewards));
            lucide.createIcons();
        }

        function showConquest(rankName) {
            setTimeout(() => {
                const container = document.getElementById('conquestOverlay');
                const card = document.createElement('div');
                card.className = "conquest-card bg-white text-black px-6 py-4 rounded-[1.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center gap-4 border-2 border-orange-500";
                card.innerHTML = `
                    <div class="bg-orange-500 p-2 rounded-full text-white"><i data-lucide="medal"></i></div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-zinc-400 mb-1">Evolução Diária</p>
                        <p class="text-sm font-black uppercase">Você atingiu o nível "${rankName}"!</p>
                    </div>
                `;
                container.appendChild(card);
                lucide.createIcons();
                setTimeout(() => { 
                    card.style.opacity = '0'; 
                    card.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => card.remove(), 500); 
                }, 3000);
            }, 800);
        }

        function completeTask(id) {
            const t = tasks.find(x => x.id === id);
            score += t.points;
            t.completed = true;
            document.getElementById('score').classList.add('animate-score');
            setTimeout(() => document.getElementById('score').classList.remove('animate-score'), 300);
            updateUI();
            showToast(`+${t.points} PONTOS`);
        }

        function addTask() {
            const title = document.getElementById('taskInput').value.trim();
            const points = parseInt(document.getElementById('taskPoints').value) || 10;
            const isDaily = document.getElementById('taskDaily').checked;
            if (title) {
                tasks.push({ id: Date.now(), title, points, isDaily, completed: false });
                document.getElementById('taskInput').value = '';
                document.getElementById('taskPoints').value = '';
                updateUI();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-20');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-20');
            }, 2000);
        }

        function clearTasksOnly() {
            if(confirm("Deseja resetar o progresso das tarefas? Seus pontos não serão alterados.")) {
                tasks = []; 
                localStorage.setItem('app_tasks', JSON.stringify(tasks));
                updateUI();
                showToast("TAREFAS LIMPAS");
            }
        }

        function restoreDefaultTasks() {
            const defaults = [
                { id: 1, title: 'Lavar louça', points: 10, isDaily: true, completed: false },
                { id: 2, title: 'Limpar Robô', points: 10, isDaily: true, completed: false },
                { id: 3, title: 'Estudar 1 Hora', points: 20, isDaily: true, completed: false },
                { id: 4, title: 'Mamadeira Bebê', points: 10, isDaily: true, completed: false },
                { id: 5, title: 'Colocar Bebê para Dormir', points: 20, isDaily: true, completed: false },
                { id: 6, title: 'Dormir antes das 11H', points: 30, isDaily: true, completed: false },
                { id: 7, title: 'Acordar até 7H', points: 30, isDaily: true, completed: false },
                { id: 8, title: 'Treinar', points: 30, isDaily: true, completed: false },
                { id: 9, title: 'Supermercado', points: 15, isDaily: true, completed: false }
            ];
            defaults.forEach(dt => {
                if (!tasks.some(t => t.title === dt.title)) tasks.push({...dt, id: Math.random()});
            });
            updateUI();
        }

        function checkDailyReset() {
            const today = new Date().toLocaleDateString();
            if (lastReset !== today) {
                tasks.forEach(t => { if(t.isDaily) t.completed = false; });
                lastReset = today;
                localStorage.setItem('app_last_reset', lastReset);
                localStorage.setItem('app_tasks', JSON.stringify(tasks));
                updateUI();
            }
        }

        // --- Funções da Loja (RenderStore Atualizado com Ícones) ---
        function renderStore() {
            const container = document.getElementById('storeItems');
            container.innerHTML = rewards.map(r => {
                const canAfford = score >= r.cost;
                const iconName = taskIcons[r.name] || taskIcons['default_reward'];
                return `
                <div class="bg-zinc-800/30 p-5 rounded-2xl border border-zinc-800">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="text-orange-500/50 bg-zinc-900 p-2 rounded-xl border border-zinc-800">
                                <i data-lucide="${iconName}"></i>
                            </div>
                            <span class="font-bold text-zinc-100 text-sm">${r.name}</span>
                        </div>
                        <button onclick="deleteItem('reward', ${r.id})" class="text-zinc-600 p-2 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <button onclick="buyReward(${r.cost}, '${r.name}')" ${!canAfford ? 'disabled' : ''} class="w-full py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border ${canAfford ? 'bg-orange-500 text-white border-orange-400 hover:bg-orange-600' : 'bg-zinc-800 text-zinc-600 border-transparent opacity-30 cursor-not-allowed'}">Resgatar • ${r.cost} pts</button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleStore() { 
            const m = document.getElementById('storeModal'); 
            m.classList.toggle('opacity-0'); 
            m.classList.toggle('pointer-events-none'); 
            if(!m.classList.contains('opacity-0')) renderStore();
        }

        function createReward() {
            const name = document.getElementById('newRewardName').value.trim();
            const cost = parseInt(document.getElementById('newRewardCost').value);
            if (name && cost) { rewards.unshift({id: Date.now(), name, cost}); renderStore(); }
        }

        function buyReward(cost, name) {
            if (score >= cost) { score -= cost; updateUI(); renderStore(); showToast("RESGATADO!"); }
        }

        function deleteItem(type, id) {
            if (confirm("Excluir?")) {
                if (type === 'task') tasks = tasks.filter(x => x.id !== id);
                else rewards = rewards.filter(x => x.id !== id);
                updateUI();
                if (type === 'reward') renderStore();
            }
        }

        function editItem(type, id) {
            // Pequena correção: Verifica qual lista buscar (tarefas ou recompensas)
            const list = type === 'task' ? tasks : rewards;
            const item = list.find(x => x.id === id);
            const currentName = type === 'task' ? item.title : item.name;
            const n = prompt("Novo nome:", currentName);
            if (n) { 
                if(type === 'task') item.title = n; else item.name = n;
                updateUI();
                if (type === 'reward') renderStore();
            }
        }

        checkDailyReset();
        setInterval(checkDailyReset, 60000); 
        updateUI();
    </script>
</body>
</html>
